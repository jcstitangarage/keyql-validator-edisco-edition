<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'none'; object-src 'none'; frame-ancestors 'none'"
    />
    <title>Purview KeyQL Tester</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header>
      <h1>Purview KeyQL Tester</h1>
      <p class="subtitle">
        Draft, validate, and dry-run eDiscovery queries locally — all data is synthetic.
      </p>
    </header>
    <main>
      <section class="editor-section">
        <label for="editor-host">Query</label>
        <div id="editor-host"></div>
        <p class="hint">
          Try <code>kind:email AND from:pilarp</code> · <code>size&gt;10000</code> ·
          <code>filetype:docx AND author:"Ann Beebe"</code>
        </p>
      </section>
      <section class="output-section">
        <h2>Diagnostics</h2>
        <ul id="diagnostics" aria-live="polite"></ul>
        <h2>Dry-run matches <span id="match-count" class="count"></span></h2>
        <ul id="matches" aria-live="polite"></ul>
        <details>
          <summary>Parsed AST</summary>
          <pre id="ast-output"></pre>
        </details>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
